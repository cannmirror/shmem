minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
  # pre-commit 基础检查
  - repo: https://gitcode.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # C++ 代码格式化检查
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        files: \.(c|h|cpp|hpp|cc|hh|cxx|hxx|asc)$
        args:
          - "--style=file"
          - "--verbose"
          - "-i"
        exclude: ^build/|tests/third_party/

  # 显式头文件包含检查（基于 clang-tidy misc-include-cleaner，AST 语义分析）
  - repo: local
    hooks:
      - id: check-header-inclusion
        name: Check explicit header inclusion
        description: Verify that C/C++ files include required headers and don't include unused ones.
        entry: tools/pre-commit/check_header_inclusion.py
        language: python
        additional_dependencies:
          - clang-tidy>=22.0
        files: \.(c|h|cpp|hpp|cc|hh|cxx|hxx)$
        exclude: ^build/|tests/third_party/
        stages: [pre-commit]

  # 拼写检查
  - repo: https://gitcode.com/gh_mirrors/co/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [
            "-L",
            "CANN,cann,NNAL,nnal,ASCEND,ascend,EnQue,CopyIn,ArchType,AND,ND,tbe,copyin,alog",
            "--skip",
            "*.py,*.cpp,*.hpp,*.c,*.h",
          ]
